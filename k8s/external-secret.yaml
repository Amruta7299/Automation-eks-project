apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: default

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: devops-external-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: devops-app-secret # The name of the kubernetes secret to create
    creationPolicy: Owner
  data:
  - secretKey: MY_APP_SECRET
    remoteRef:
      key: prod/devops-app/secrets # The name of the secret in AWS Secrets Manager
      property: MY_APP_SECRET
